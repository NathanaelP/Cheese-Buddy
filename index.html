<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cheese Buddy</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #fffdf5;
        color: #2d2d2d;
        min-height: 100vh;
    }

    header{
        background: linear-gradient(135deg, #f5a623, #ff6b35);
        color: white;
        padding: 20px 16px 16px;
        text-align: center;
        box-shadow: 0 2px 12px rgba(245, 166, 35, 0.5);
    }

    header h1 {
        font-size: 1.8em;
        font-weight: 800;
        letter-spacing: -0.5px;
    }

    header p{
        font-size: 0.85rem;
        opacity: 0.9;
        margin-top: 4px;
    }
<!-- forms styling -->
    .container {
        max-width: 600px;
        margin: 0 auto;
        padding: 16px;
    }

    .add-form {
        background: white;
        border-radius: 12px;
        padding: 16px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        border: 1px solid #e0d9cc;
        margin-bottom: 16px;
    }

    .add-form h2 {
        font-size: 1rem;
        font-weight: 700;
        color: #d4881a;
        margin-bottom: 12px;
        
    }

    .add-form input {
        width: 100%;
        padding: 10px 12px;
        border: 1.5px solid #e0d9cc;
        border-radius: 8px;
        font-size: 0.95rem;
        background: #fafafa;
        color: #2d2d2d;
        margin-bottom: 10px;
    }

    .add-form input:focus {
        outline: none;
        border-color: #f5a623;
        background: #fff;
    }

    .add-form button {
        background: linear-gradient(135deg, #f5a623, #ff6b35);
        color: white;
        border: none;
        padding: 11px;
        border-radius: 8px;
        font-size: 0.95rem;
        cursor: pointer;
        width: 100%;
    }

    .add-form button:active {
        transform: scale(0.98);
    }

<!--Summary and chips styling-->
    .summary {
        display: flex;
        gap: 8px;
        margin-bottom: 14px;
    }

    .summary-chip {
        flex: 1;
        text-align: center;
        padding: 8px 4px;
        border-radius: 8px;
        font-size: 0.78rem;
        font-weight: 700;
    }

    .summary-chip .count {
        font-size: 1.3rem;
        display: block;
    }

    .summary-chip.green {
        background: #eafaf1;
        color: #27ae60;
    }

    .summary-chip.yellow {
        background: #fef9e7;
        color: #e67e22;
    }

    .summary-chip.red {
        backgound: #fdedec;
        color: #c0392b;
    }

    .filter-buttons {
        display: flex;
        gap: 8px;
        margin-bottom: 14px;
    }

    .filter-buttons button {
        flex: 1;
        padding: 9px 4px;
        border-radius: 8px;
        border: 1.5px solid #e0d9cc;
        background: white;
        font-size: 0.85rem;
        font-weight: 600;
        color: #666;
        cursor: pointer;
        transition: all 0.2s;
    }

    .filter-buttons button.active {
        background: linear-gradient(135deg, #f5a623, #ff6b35);
        color: white;
        border-color: transparent;
    }

<!--Search Filter bar styling-->
    .search-bar {
        position: relative;
        margin-bottom: 14px;
    }

    .search-bar input {
        width: 100%;
        padding: 10px 36px 10px 12px;
        border: 1.5px solid #e0d9cc;
        border-radius: 8px;
        font-size: 0.95rem;
        background: white;
        color: #2d2d2d;
    }

    .search-bar input:focus {
        outline: none;
        border-color: #f5a623;
    }

    #searchClear {
        position:absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        background:none;
        border: none;
        font-size: 1rem;
        color: #666;
        cursor: pointer;
        display: none;
    }

    .item-card {
        background: white;
        border-radius: 12px;
        padding: 14px 16px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        border-top: 1px solid #e0d9cc;
        border-right: 1px solid #e0d9cc;
        border-bottom: 1px solid #e0d9cc;
        border-left: 5px solid #27ae60;
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
    }

    .item-card.green {
        border-left-color: #27ae60;
        background: #eafaf1;
    }

    .item-card-yellow {
        border-left-color: #e67e22;
        background: #fef9e7;
    }

    .item-card.red {
        border-left-color: #c0392b;
        background: #fdedec;
    }

    .item-info {
        flex: 1;
        min-width: 0;
    }

    .item-name {
        font-size: 0.95rem;
        font-weight: 700;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .item-date {
        font-size: 0.8rem;
        color: #666;
        margin-top: 2px;
    }

    .item-badge {
        font-size: 0.75rem;
        font-weight: 700;
        padding: 3px 9px;
        border-radius: 20px;
        white-space: nowrap;
        flex-shrink: 0;
    }

    .item-card.green .item-badge {
        background: #a9dfbf;
        color: #27ae60;
    }

    .item-card.yellow .item-badge {
        background: #f9e4b7;
        color: #e67e22;
    }

    .item-card.red .item-badge {
        background: #f5b7b1;
        color: #c0392b;
    }

    .btn-delete {
        background: none;
        border: none;
        font-size: 1.1rem;
        cursor: pointer;
        color: #666;
        padding: 4px 6px;
        border-radius: 6px;
        flex-shrink: 0;
    }

    .btn-delete:hover {
        background: #fdedec;
        color: #c0392b;
    }

    .empty-state {
        text-align: center;
        color: #666;
        font-size: 0.9rem;
        padding: 32px 16px;
    }

    .empty-state span {
        font-size:2rem;
        display: block;
        margin-bottom: 8px;
    }

    footer {
        text-align: center;
        font-size: 0.75rem;
        color: #666;
        padding: 20px 16px;
    }
    

  </style>
</head>
<body>
    <header>
        <h1>🧀 Cheese Buddy</h1>
        <p>Your friendly cheese Expiration companion!</p>
        <p>Color-coded for Freshness</p>

        <div class="container">

            <div class="add-form">
                <h2>➕ Add Item</h2>
                <input type="text" id="inputName" placeholder="Product name (e.g. Boar's Head Gouda)" />
                <input type="date" id="inputDate" />
                <button onclick="addItem()">Add to Tracker</button>
            </div>

            <div class="summary">
                <div class="summary-chip green"><span class="count" id="countGreen">0</span>Fresh</div>
                <div class="summary-chip yellow"><span class="count" id="countYellow">0</span>Expiring Soon</div>
                <div class="summary-chip red"><span class="count" id="countRed">0</span>Expired</div>
            </div>

            <div class="filter-buttons">
                <button onclick="setFilter('all')" id="btnAll" class="active">All</button>
                <button onclick="setFilter('yellow')" id="btnYellow">Expiring Soon</button>
                <button onclick="setFilter('red')" id="btnExpired">Expired</button>
            </div>

            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search Products..." oninput="renderItems()" />
                <button onclick="clearSearch()" id="searchClear">X</button>
            </div>

            <div class="items-section">
                <div id="itemsList"></div>
            </div>

        </div>

        <footer>
            <p>Made with 🧀 by Cheese Buddy Team</p>
            <p>Offline Storage - Saved on this device</p>
        </footer>
    </header>

</body>
</html>
