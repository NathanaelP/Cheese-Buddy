<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cheese Buddy</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #fffdf5;
        color: #2d2d2d;
        min-height: 100vh;
    }

    header{
        background: linear-gradient(135deg, #f5a623, #ff6b35);
        color: white;
        padding: 20px 16px 16px;
        text-align: center;
        box-shadow: 0 2px 12px rgba(245, 166, 35, 0.5);
    }

    header h1 {
        font-size: 1.8em;
        font-weight: 800;
        letter-spacing: -0.5px;
    }

    header p{
        font-size: 0.85rem;
        opacity: 0.9;
        margin-top: 4px;
    }

    .container {
        max-width: 600px;
        margin: 0 auto;
        padding: 16px;
    }

    .add-form {
        background: white;
        border-radius: 12px;
        padding: 16px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        border: 1px solid #e0d9cc;
        margin-bottom: 16px;
    }

    .add-form h2 {
        font-size: 1rem;
        font-weight: 700;
        color: #d4881a;
        margin-bottom: 12px;
        
    }

    .add-form input {
        width: 100%;
        padding: 10px 12px;
        border: 1.5px solid #e0d9cc;
        border-radius: 8px;
        font-size: 0.95rem;
        background: #fafafa;
        color: #2d2d2d;
        margin-bottom: 10px;
    }

    .add-form input:focus {
        outline: none;
        border-color: #f5a623;
        background: #fff;
    }

    .add-form button {
        background: linear-gradient(135deg, #f5a623, #ff6b35);
        color: white;
        border: none;
        padding: 11px;
        border-radius: 8px;
        font-size: 0.95rem;
        cursor: pointer;
        width: 100%;
    }

    .add-form button:active {
        transform: scale(0.98);
    }


  </style>
</head>
<body>
    <header>
        <h1>🧀 Cheese Buddy</h1>
        <p>Your friendly cheese Expiration companion!</p>
        <p>Color-coded for Freshness</p>

        <div class="container">

            <div class="add-form">
                <h2>➕ Add Item</h2>
                <input type="text" id="inputName" placeholder="Product name (e.g. Boar's Head Gouda)" />
                <input type="date" id="inputDate" />
                <button onclick="addItem()">Add to TraCKER</button>
            </div>

            <div class="summary">
                <div class="summary-chip green"><span class="count" id="countGreen">0</span>Fresh</div>
                <div class="summary-chip yellow"><span class="count" id="countYellow">0</span>Expiring Soon</div>
                <div class="summary-chip red"><span class="count" id="countRed">0</span>Expired</div>
            </div>

            <div class="filter-buttons">
                <button onclick="setFilter('all')" id="btnAll" class="active">All</button>
                <button onclick="setFilter('yellow')" id="btnYellow">Expiring Soon</button>
                <button onclick="setFilter('red')" id="btnExpired">Expired</button>
            </div>

            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search Products..." oninput="renderItems()" />
                <button onclick="clearSearch()" id="searchClear">X</button>
            </div>

            <div class="items-section">
                <div id="itemsList"></div>
            </div>

        </div>

        <footer>
            <p>Made with 🧀 by Cheese Buddy Team</p>
            <p>Offline Storage - Saved on this device</p>
        </footer>
    </header>

</body>
</html>
